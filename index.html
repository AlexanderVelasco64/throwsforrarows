<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty Portfolio | Recruitment</title>
    <style>
        :root { --accent: #00ff00; --dark: #111; --light: #fff; }
        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--dark); color: var(--light); line-height: 1.6; }
        
        /* Banner & Hero Section */
        .hero { 
            position: relative;
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('banner.jpg') center/cover;
            display: flex; align-items: center; justify-content: center; text-align: center;
            border-bottom: 8px solid var(--accent);
        }
        .hero-content h1 { font-size: clamp(2rem, 8vw, 4rem); text-transform: uppercase; font-style: italic; margin: 0; }

        /* Headshot & Profile */
        .profile-section { display: flex; align-items: center; gap: 30px; padding: 60px 20px; max-width: 900px; margin: auto; flex-wrap: wrap; }
        .headshot { 
            width: 200px; height: 200px; border-radius: 50%; border: 5px solid var(--accent);
            object-fit: cover; background: #333;
        }

        /* Contact Form */
        .contact-box { background: #222; padding: 40px; border-radius: 10px; border-top: 5px solid var(--accent); margin-top: 40px; }
        input, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; border: none; background: #333; color: #fff; font-family: sans-serif; 
        }
        .btn { 
            background: var(--accent); color: #000; padding: 15px 30px; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; display: inline-block;
        }
        .container { max-width: 900px; margin: auto; padding: 20px; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Pushing Limits.</h1>
            <p>High-Performance Development & Strategy</p>
        </div>
    </section>

    <div class="container">
        <section class="profile-section">
            <img src="headshot.jpg" alt="Your Name" class="headshot">
            <div>
                <h2>The Professional Athlete of Tech</h2>
                <p>I build robust, scalable solutions with the precision of an elite athlete. Ready to take your project to the podium?</p>
            </div>
        </section>

        <section id="contact" class="contact-box">
            <h2>Recruit Me for Your Team</h2>
            <!-- Update the 'action' URL after signing up at Formspree.io -->
            <form action="https://formspree.io" method="POST">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" rows="5" placeholder="Project details..." required></textarea>
                <button type="submit" class="btn">Send Intelligence Report</button>
            </form>
        </section>
    </div>

</body>
</html>
