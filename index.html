<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty Portfolio | Recruiting</title>
    <style>
        body { margin: 0; font-family: 'Arial Black', sans-serif; background: #111; color: #fff; }
        header { padding: 50px 20px; text-align: center; background: linear-gradient(45deg, #00ff00, #000); }
        h1 { font-size: 3rem; text-transform: uppercase; font-style: italic; }
        .container { padding: 40px; max-width: 900px; margin: auto; }
        .btn { background: #00ff00; color: #000; padding: 15px 30px; text-decoration: none; font-weight: bold; border-radius: 5px; }
        .section { margin-bottom: 50px; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #222; padding: 20px; border-left: 5px solid #00ff00; }
    </style>
</head>
<body>
    <header>
        <h1>My Power Portfolio</h1>
        <p>Elite Performance. Professional Results.</p><br>
        <a href="#contact" class="btn">RECRUIT ME</a>
    </header>
    <div class="container">
        <section class="section">
            <h2>Recent Wins</h2>
            <div class="portfolio-grid">
                <div class="card"><h3>Project Alpha</h3><p>High-intensity development.</p></div>
                <div class="card"><h3>Project Beta</h3><p>Strategy and execution.</p></div>
            </div>
        </section>
        <section id="contact" class="section">
            <h2>Ready to Team Up?</h2>
            <p>Let's hit the ground running. Send me a message today.</p>
            <a href="mailto:your@email.com" class="btn">START PROJECT</a>
        </section>
    </div>
</body>
</html>
